# Fuso horário da JVM fixado para Brasília (UTC-3)
spring.jackson.time-zone=America/Sao_Paulo

# Configurações do MongoDB
spring.data.mongodb.uri=mongodb://localhost:27017/mindDB

# Configurações JWT
jwt.secret=MindYourMindSecretKeyForJWT2024ThisMustBeAtLeast32CharactersLong
jwt.expiration.ms=900000
jwt.refresh.expiration.ms=86400000

# Porta do servidor
server.port=8080

# URLs para ativação e serviços
app.url=http://localhost:8080
email.service.url=http://localhost:8081

# Configurações Swagger/OpenAPI
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tagsSorter=alpha
springdoc.swagger-ui.try-it-out-enabled=true

# Configurações de log (opcional)
logging.level.org.springframework.security=DEBUG
logging.level.com.mind_your.mind=DEBUG