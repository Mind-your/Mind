server.port=8081
spring.application.name=email-service

# Active profiles (set local by default for dev)
spring.profiles.active=${SPRING_PROFILES_ACTIVE:local}

# Brevo SMTP Configuration with placeholders
# Default host/port are for Brevo, but can be overridden by env vars
spring.mail.host=${BREVO_SMTP_HOST:smtp-relay.brevo.com}
spring.mail.port=${BREVO_SMTP_PORT:587}
spring.mail.username=${BREVO_SMTP_USER:ldw.mind@proton.me}
spring.mail.password=${BREVO_SMTP_PASS:default_password}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# Custom property for the "From" header (Must be a verified sender in Brevo)
app.mail.from=${APP_MAIL_FROM:ldw.mind@proton.me}

# Thymeleaf
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html
spring.thymeleaf.mode=HTML
spring.thymeleaf.encoding=UTF-8
spring.thymeleaf.cache=false
