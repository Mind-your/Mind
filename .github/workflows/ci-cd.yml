name: CI/CD - Mind Your Mind

on:
  push:
    branches: [dev, main]
  pull_request:
    branches: [dev, main]

jobs:
  # BACKEND — Build e Testes
  backend:
    name: Backend (Spring Boot)
    runs-on: ubuntu-latest

    services:
      mongodb:
        image: mongo:7
        ports:
          - 27017:27017

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cache Maven
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('backend/pom.xml') }}
          restore-keys: ${{ runner.os }}-maven-

      - name: Build e testes
        run: cd backend && mvn clean verify
        env:
          SPRING_DATA_MONGODB_URI: mongodb://localhost:27017/mindDB

      - name: Gerar JAR
        # Permite gerar o JAR tanto na main quanto na dev para testes
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/dev'
        run: cd backend && mvn clean package -DskipTests
        env:
          SPRING_DATA_MONGODB_URI: mongodb://localhost:27017/mindDB

      - name: Upload JAR como artefato
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/dev'
        uses: actions/upload-artifact@v4
        with:
          name: backend-jar
          path: backend/target/*.jar

  # FRONTEND — Build
  frontend:
    name: Frontend (React)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Instalar dependências
        run: cd frontend && npm ci

      - name: Build
        run: cd frontend && npm run build

      - name: Upload build como artefato
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/dev'
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build
          path: frontend/dist

  # DOCKER — Build & Push
  docker-build-push:
    name: Docker Build & Push
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    # Liberado para main e dev
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/dev'

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login no Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USER }}
          password: ${{ secrets.DOCKER_PASS }}

      - name: Definir Tag da Imagem
        id: vars
        run: |
          if [ "${{ github.ref_name }}" = "main" ]; then
            echo "tag=latest" >> $GITHUB_OUTPUT
          else
            echo "tag=dev" >> $GITHUB_OUTPUT
          fi

      - name: Build and push Backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: ${{ secrets.DOCKER_USER }}/mind-backend:${{ steps.vars.outputs.tag }}

      - name: Build and push Frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: ${{ secrets.DOCKER_USER }}/mind-frontend:${{ steps.vars.outputs.tag }}

  # DEPLOY — só na main
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: docker-build-push
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Deploy via Docker Compose
        run: |
          echo "Simulando deploy para a produção (Sempre via tag :latest)"
          echo "ssh user@ip 'docker-compose pull && docker-compose up -d'"