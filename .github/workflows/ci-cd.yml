name: CI/CD - Mind Your Mind

on:
  push:
    branches: [dev]
  pull_request:
    branches: [dev]

jobs:
  # BACKEND — Build e Testes
  backend:
    name: Backend (Spring Boot)
    runs-on: ubuntu-latest

    services:
      mongodb:
        image: mongo:7
        ports:
          - 27017:27017

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cache Maven
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('backend/pom.xml') }}
          restore-keys: ${{ runner.os }}-maven-

      - name: Build e testes
        run: cd backend && mvn clean verify
        env:
          SPRING_DATA_MONGODB_URI: mongodb://localhost:27017/mindDB

      - name: Gerar JAR
        if: github.ref == 'refs/heads/main'
        run: cd backend && mvn clean package -DskipTests
        env:
          SPRING_DATA_MONGODB_URI: mongodb://localhost:27017/mindDB

      - name: Upload JAR como artefato
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: backend-jar
          path: backend/target/*.jar

  # FRONTEND — Build
  frontend:
    name: Frontend (React)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Instalar dependências
        run: cd frontend && npm ci

      - name: Build
        run: cd frontend && npm run build

      - name: Upload build como artefato
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build
          path: frontend/dist

  # DEPLOY BACKEND — só na main
  deploy-backend:
    name: Deploy Backend
    runs-on: ubuntu-latest
    needs: backend
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Download JAR
        uses: actions/download-artifact@v4
        with:
          name: backend-jar

      - name: Deploy pendente
        run: echo "Configure o deploy do backend descomentando o bloco da sua plataforma."

  # DEPLOY FRONTEND — só na main
  deploy-frontend:
    name: Deploy Frontend
    runs-on: ubuntu-latest
    needs: frontend
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Download build
        uses: actions/download-artifact@v4
        with:
          name: frontend-build

      - name: Deploy pendente
        run: echo "Deploy será configurado em breve"