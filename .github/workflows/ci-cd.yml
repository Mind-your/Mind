name: CI/CD - Mind Your Mind

on:
  push:
    branches: [dev, main]
  pull_request:
    branches: [dev, main]

jobs:
  # BACKEND — Build e Testes
  backend:
    name: Backend (Spring Boot)
    runs-on: ubuntu-latest

    services:
      mongodb:
        image: mongo:7
        ports:
          - 27017:27017

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cache Maven
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('backend/pom.xml') }}
          restore-keys: ${{ runner.os }}-maven-

      - name: Build e testes
        run: cd backend && mvn clean verify
        env:
          SPRING_DATA_MONGODB_URI: mongodb://localhost:27017/mindDB

      - name: Gerar JAR
        if: github.ref == 'refs/heads/main'
        run: cd backend && mvn clean package -DskipTests
        env:
          SPRING_DATA_MONGODB_URI: mongodb://localhost:27017/mindDB

      - name: Upload JAR como artefato
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: backend-jar
          path: backend/target/*.jar

  # FRONTEND — Build
  frontend:
    name: Frontend (React)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Instalar dependências
        run: cd frontend && npm ci

      - name: Build
        run: cd frontend && npm run build

      - name: Upload build como artefato
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build
          path: frontend/dist

  # DOCKER — Build & Push (Somente na Main)
  docker-build-push:
    name: Docker Build & Push
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login no Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USER }}
          password: ${{ secrets.DOCKER_PASS }}

      - name: Build and push Backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: ${{ secrets.DOCKER_USER }}/mind-backend:latest

      - name: Build and push Frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: ${{ secrets.DOCKER_USER }}/mind-frontend:latest

  # DEPLOY — só na main
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: docker-build-push
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Deploy via Docker Compose
        run: |
          echo "Para o deploy real, você pode usar um passo de SSH para rodar o comando no servidor:"
          echo "ssh user@ip 'docker-compose pull && docker-compose up -d'"
          echo "Simulando deploy..."